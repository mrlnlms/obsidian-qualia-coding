name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build (tsc + esbuild)
        run: npm run build

      - name: Unit tests + coverage gate (Vitest)
        run: npx vitest run --coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build plugin
        run: npm run build

      - name: Cache Obsidian
        uses: actions/cache@v5
        with:
          path: .obsidian-cache
          key: obsidian-${{ runner.os }}

      - name: E2E full suite (Obsidian + xvfb)
        # wdio.conf.mts default specs glob covers all 19 spec files (66 tests).
        # Smoke alone validated only that Obsidian boots; full suite catches engine regressions.
        run: xvfb-run npx wdio run wdio.conf.mts

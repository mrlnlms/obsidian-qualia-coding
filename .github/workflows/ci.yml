name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build (tsc + esbuild)
        run: npm run build

      - name: Unit tests + coverage gate (Vitest)
        run: npx vitest run --coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build plugin
        run: npm run build

      - name: Cache Obsidian
        uses: actions/cache@v4
        with:
          path: .obsidian-cache
          key: obsidian-${{ runner.os }}

      - name: E2E smoke tests (Obsidian + xvfb)
        uses: coactions/setup-xvfb@v1
        with:
          run: npx wdio run wdio.conf.mts --spec test/e2e/specs/smoke.e2e.ts
